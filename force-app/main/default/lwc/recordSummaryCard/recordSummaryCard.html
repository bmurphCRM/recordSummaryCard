<template>
    <lightning-card>
        <div slot="title">
            <div class="card-title-row">
                <lightning-icon icon-name="standard:metrics" size="small" class="slds-m-right_x-small"></lightning-icon>
                <span class="slds-text-heading_small">{cardTitleDisplay}</span>
            </div>
        </div>
        <div slot="actions">
            <lightning-button-icon
                icon-name="utility:refresh"
                alternative-text="Refresh"
                title="Refresh metrics"
                onclick={handleRefresh}
                disabled={isLoading}>
            </lightning-button-icon>
        </div>

        <div class="slds-card__body slds-card__body_inner">
            <div class={themeClass}>

                <!-- Loading state -->
                <template lwc:if={isLoading}>
                    <div class="loading-container" aria-busy="true" aria-label="Loading record metrics">
                        <lightning-spinner alternative-text="Loading metrics" size="medium"></lightning-spinner>
                    </div>
                </template>

                <!-- Error state -->
                <template lwc:elseif={hasError}>
                    <div class="error-container" role="alert">
                        <lightning-icon icon-name="utility:error" size="small" variant="error" class="slds-m-right_x-small"></lightning-icon>
                        <span class="slds-text-color_error">{errorMessage}</span>
                    </div>
                </template>

                <!-- Metrics grid -->
                <template lwc:else>
                    <div aria-live="polite" aria-atomic="false">
                        <span class="slds-assistive-text">{liveAnnouncement}</span>
                    </div>

                    <!-- All tiles in one grid — duration is 5th column when configured -->
                    <div class="metrics-grid" role="list" aria-label="Record activity metrics">

                        <!-- Open Activities -->
                        <div class="metric-tile metric-tile--activities-open"
                             role="listitem"
                             tabindex="0"
                             aria-label={ariaOpenActivities}
                             onclick={handleOpenActivitiesClick}
                             onkeydown={handleTileKeyDown}
                             data-action="openActivities">
                            <div class="metric-tile__icon-wrap icon-accent-1">
                                <lightning-icon icon-name="standard:task" size="small" alternative-text="Open activities"></lightning-icon>
                            </div>
                            <div class="metric-tile__body">
                                <span class="metric-tile__value" aria-hidden="true">{metrics.openActivities}</span>
                                <span class="metric-tile__label">Open Activities</span>
                            </div>
                            <div class="metric-tile__badge">
                                <template lwc:if={hasOverdueActivities}>
                                    <span class="overdue-badge" title="Includes overdue tasks" aria-label="Includes overdue tasks">
                                        <lightning-icon icon-name="utility:warning" size="xx-small" variant="warning"></lightning-icon>
                                    </span>
                                </template>
                            </div>
                        </div>

                        <!-- Completed Activities -->
                        <div class="metric-tile metric-tile--activities-done"
                             role="listitem"
                             tabindex="0"
                             aria-label={ariaCompletedActivities}
                             onclick={handleCompletedActivitiesClick}
                             onkeydown={handleTileKeyDown}
                             data-action="completedActivities">
                            <div class="metric-tile__icon-wrap icon-accent-2">
                                <lightning-icon icon-name="utility:check" size="small" alternative-text="Completed activities"></lightning-icon>
                            </div>
                            <div class="metric-tile__body">
                                <span class="metric-tile__value" aria-hidden="true">{metrics.completedActivities}</span>
                                <span class="metric-tile__label">Completed Activities</span>
                            </div>
                            <div class="metric-tile__badge"></div>
                        </div>

                        <!-- Notes -->
                        <div class="metric-tile metric-tile--notes"
                             role="listitem"
                             tabindex="0"
                             aria-label={ariaNotes}
                             onclick={handleNotesClick}
                             onkeydown={handleTileKeyDown}
                             data-action="notes">
                            <div class="metric-tile__icon-wrap icon-accent-3">
                                <lightning-icon icon-name="standard:note" size="small" alternative-text="Notes"></lightning-icon>
                            </div>
                            <div class="metric-tile__body">
                                <span class="metric-tile__value" aria-hidden="true">{metrics.notes}</span>
                                <span class="metric-tile__label">Notes</span>
                            </div>
                            <div class="metric-tile__badge"></div>
                        </div>

                        <!-- Files -->
                        <div class="metric-tile metric-tile--files"
                             role="listitem"
                             tabindex="0"
                             aria-label={ariaFiles}
                             onclick={handleFilesClick}
                             onkeydown={handleTileKeyDown}
                             data-action="files">
                            <div class="metric-tile__icon-wrap icon-accent-4">
                                <lightning-icon icon-name="doctype:attachment" size="small" alternative-text="Files"></lightning-icon>
                            </div>
                            <div class="metric-tile__body">
                                <span class="metric-tile__value" aria-hidden="true">{metrics.files}</span>
                                <span class="metric-tile__label">Files</span>
                            </div>
                            <div class="metric-tile__badge"></div>
                        </div>

                        <!-- Duration (5th tile) — hidden unless openDateField configured + data returned -->
                        <template lwc:if={showDuration}>
                            <div class="metric-tile metric-tile--duration"
                                 role="listitem"
                                 tabindex="0"
                                 aria-label={ariaDuration}>
                                <div class="metric-tile__icon-wrap icon-accent-5">
                                    <lightning-icon icon-name="utility:clock" size="small" alternative-text="Record duration"></lightning-icon>
                                </div>
                                <div class="metric-tile__body">
                                    <span class="metric-tile__value" aria-hidden="true">{durationDaysLabel}</span>
                                    <span class="duration-hm" aria-hidden="true">{durationHmLabel}</span>
                                    <span class="metric-tile__label">Duration</span>
                                </div>
                                <div class="metric-tile__badge">
                                    <span class={durationStatusClass}>
                                        <template lwc:if={isRecordOpen}>
                                            <span class="pulse-dot" aria-hidden="true"></span>
                                        </template>
                                        {durationStatusLabel}
                                    </span>
                                </div>
                            </div>
                        </template>

                    </div>

                    <!-- Last refreshed timestamp -->
                    <div class="refresh-timestamp" aria-label="Metrics last refreshed">
                        <lightning-icon icon-name="utility:clock" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                        <span class="slds-text-body_small slds-text-color_weak">Updated {lastRefreshed}</span>
                    </div>

                </template>

            </div>
        </div>
    </lightning-card>
</template>
