<template>
    <lightning-card icon-name="standard:account">
        <!-- Custom Header with Title and Subtitle -->
        <div slot="title">
            <div class="component-header">
                <h2 class="slds-card__header-title">{title}</h2>
                <template if:true={hasSubtitle}>
                    <p class="component-subtitle">{subtitle}</p>
                </template>
            </div>
        </div>
        
        <!-- Search Form -->
        <div class="slds-card__body slds-card__body_inner">
            <div class="slds-grid slds-wrap slds-gutters">
                <!-- Name Search -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                    <lightning-input
                        type="text"
                        label="Provider Name"
                        placeholder="Search by name..."
                        value={searchName}
                        onchange={handleNameChange}>
                    </lightning-input>
                </div>

                <!-- Type Filter -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                    <lightning-combobox
                        name="type"
                        label="Provider Type"
                        placeholder="Select Type"
                        options={typeOptions}
                        value={searchType}
                        onchange={handleTypeChange}>
                    </lightning-combobox>
                </div>

                <!-- Category Filter -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                    <lightning-combobox
                        name="category"
                        label="Category"
                        placeholder="Select Category"
                        options={categoryOptions}
                        value={searchCategory}
                        onchange={handleCategoryChange}>
                    </lightning-combobox>
                </div>

                <!-- ZIP Code Search -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                    <lightning-input
                        type="text"
                        label="ZIP Code"
                        placeholder="Enter ZIP..."
                        value={searchZipCode}
                        onchange={handleZipCodeChange}
                        pattern="[0-9]*"
                        max-length="10">
                    </lightning-input>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="slds-m-top_medium slds-grid slds-grid_align-end">
                <lightning-button
                    variant="neutral"
                    label="Clear"
                    onclick={handleClear}
                    class="slds-m-right_x-small">
                </lightning-button>
                <lightning-button
                    variant="brand"
                    label="Search"
                    onclick={handleSearch}
                    disabled={isLoading}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>

    <!-- Loading Spinner -->
    <template if:true={isLoading}>
        <div class="slds-m-top_medium slds-text-align_center">
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </div>
    </template>

    <!-- Error Message -->
    <template if:true={error}>
        <div class="slds-m-top_medium">
            <lightning-card>
                <div class="slds-text-color_error slds-p-around_medium">
                    <lightning-icon
                        icon-name="utility:error"
                        size="small"
                        variant="error"
                        class="slds-m-right_x-small">
                    </lightning-icon>
                    {error}
                </div>
            </lightning-card>
        </div>
    </template>

    <!-- Results Section -->
    <template if:true={showResults}>
        <!-- No Results Message -->
        <template if:true={noResults}>
            <div class="slds-m-top_medium">
                <lightning-card>
                    <div class="slds-text-align_center slds-p-around_large">
                        <lightning-icon
                            icon-name="utility:search"
                            size="large"
                            class="slds-m-bottom_small">
                        </lightning-icon>
                        <p class="slds-text-heading_small">No providers found</p>
                        <p class="slds-text-body_small slds-m-top_x-small">
                            Try adjusting your search criteria
                        </p>
                    </div>
                </lightning-card>
            </div>
        </template>

        <!-- Results with Map -->
        <template if:true={hasResults}>
            <!-- Result Count -->
            <div class="slds-m-top_medium slds-m-bottom_small">
                <lightning-card>
                    <div class="slds-p-horizontal_medium slds-p-vertical_small">
                        <p class="slds-text-heading_small slds-text-color_default">
                            {resultCountLabel}
                        </p>
                    </div>
                </lightning-card>
            </div>

            <!-- Map -->
            <template if:true={showMap}>
                <div class="slds-m-bottom_medium">
                    <lightning-card title="Provider Locations">
                        <div class="map-container">
                            <lightning-map
                                map-markers={mapMarkers}
                                zoom-level={mapZoomLevel}
                                center={centerLocation}
                                onmarkerselect={handleMarkerSelect}
                                list-view="auto">
                            </lightning-map>
                        </div>
                    </lightning-card>
                </div>
            </template>

            <!-- Legend -->
            <div class="slds-m-bottom_medium">
                <lightning-card title="Legend">
                    <div class="slds-p-around_small">
                        <div class="legend-container">
                            <div class="legend-item">
                                <span class="legend-color" style="background-color: #FF6B6B;"></span>
                                <span>Food Provider</span>
                            </div>
                            <div class="legend-item">
                                <span class="legend-color" style="background-color: #4ECDC4;"></span>
                                <span>Shelter Provider</span>
                            </div>
                            <div class="legend-item">
                                <span class="legend-color" style="background-color: #45B7D1;"></span>
                                <span>Medical Provider</span>
                            </div>
                            <div class="legend-item">
                                <span class="legend-color" style="background-color: #FFA07A;"></span>
                                <span>Housing Provider</span>
                            </div>
                            <div class="legend-item">
                                <span class="legend-color" style="background-color: #9B59B6;"></span>
                                <span>Mental Health Provider</span>
                            </div>
                            <div class="legend-item">
                                <span class="legend-color" style="background-color: #F39C12;"></span>
                                <span>Employment Services</span>
                            </div>
                            <div class="legend-item">
                                <span class="legend-color" style="background-color: #3498DB;"></span>
                                <span>Legal Services</span>
                            </div>
                            <div class="legend-item">
                                <span class="legend-color" style="background-color: #95A5A6;"></span>
                                <span>Other</span>
                            </div>
                        </div>
                    </div>
                </lightning-card>
            </div>

            <!-- Results Table -->
            <lightning-card title="Provider Details">
                <div class="slds-scrollable_x">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col">
                                    <div class="slds-truncate" title="Name">Name</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Type">Type</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Category">Category</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="Address">Address</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title="ZIP Code">ZIP Code</div>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={enrichedAccounts} for:item="account">
                                <tr key={account.id} class="table-row" data-id={account.id} onclick={handleRowClick}>
                                    <th scope="row" data-label="Name">
                                        <div class="slds-truncate slds-text-link" title={account.name}>
                                            {account.name}
                                        </div>
                                    </th>
                                    <td data-label="Type">
                                        <div class="slds-truncate" title={account.type}>
                                            <span class="type-indicator" style={account.colorStyle}></span>
                                            {account.type}
                                        </div>
                                    </td>
                                    <td data-label="Category">
                                        <div class="slds-truncate" title={account.category}>
                                            {account.category}
                                        </div>
                                    </td>
                                    <td data-label="Address">
                                        <div class="slds-truncate" title={account.fullAddress}>
                                            {account.fullAddress}
                                        </div>
                                    </td>
                                    <td data-label="ZIP Code">
                                        <div class="slds-truncate" title={account.postalCode}>
                                            {account.postalCode}
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </lightning-card>
        </template>
    </template>
</template>
